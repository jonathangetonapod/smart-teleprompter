<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Teleprompter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Setup Panel -->
    <div id="setup-panel" class="panel">
      <h1>🎬 Smart Teleprompter</h1>
      <p class="subtitle">Voice-controlled scrolling that follows along as you speak</p>
      
      <div class="controls">
        <label for="script-input">Paste your script:</label>
        <textarea id="script-input" placeholder="Enter your script here..."></textarea>
        
        <div class="settings">
          <div class="setting">
            <label for="font-size">Font Size</label>
            <input type="range" id="font-size" min="24" max="120" value="48">
            <span id="font-size-value">48px</span>
          </div>
          
          <div class="setting">
            <label for="scroll-speed">Auto-Scroll Speed</label>
            <input type="range" id="scroll-speed" min="10" max="150" value="50">
            <span id="scroll-speed-value">50</span>
          </div>
          
          <div class="setting" style="display:none">
            <label for="stt-provider">Speech Recognition</label>
            <select id="stt-provider">
              <option value="deepgram">🎯 Deepgram Nova-3</option>
            </select>
          </div>
          
          <div class="setting">
            <label for="language">Language</label>
            <select id="language">
              <option value="en">🇺🇸 English</option>
              <option value="es">🇪🇸 Spanish</option>
              <option value="multi">🌍 Auto-detect</option>
              <option value="pt">🇧🇷 Portuguese</option>
              <option value="fr">🇫🇷 French</option>
              <option value="de">🇩🇪 German</option>
            </select>
          </div>
          
          <div class="setting">
            <label for="scroll-mode">Scroll Mode</label>
            <select id="scroll-mode">
              <option value="word-follow">🎯 Word Follow (listens & follows your words)</option>
              <option value="auto-scroll">📜 Auto-scroll (scrolls while speaking)</option>
            </select>
          </div>
          
          <div class="setting">
            <label for="mirror-mode">Mirror Mode</label>
            <select id="mirror-mode">
              <option value="none">None</option>
              <option value="horizontal">Horizontal (← flip)</option>
              <option value="vertical">Vertical (↕ flip)</option>
              <option value="both">Both (180° rotate)</option>
            </select>
          </div>
          
          <div class="setting">
            <label>
              <input type="checkbox" id="dark-mode" checked>
              Dark Mode
            </label>
          </div>
        </div>
        
        <button id="convert-btn" class="secondary-btn">🤖 Convert to Script (AI)</button>
        <button id="start-btn" class="primary-btn">🎤 Start Teleprompter</button>
      </div>
    </div>
    
    <!-- Teleprompter View -->
    <div id="teleprompter" class="hidden">
      <div id="script-container">
        <div id="script-text"></div>
      </div>
      
      <div id="status-bar">
        <div id="mic-status">🎤 Listening...</div>
        <div id="transcript"></div>
      </div>
      
      <div id="teleprompter-controls">
        <button id="scroll-up-btn">⬆️</button>
        <button id="scroll-down-btn">⬇️</button>
        <button id="pause-btn">⏸️ Pause</button>
        <button id="reset-btn">🔄 Reset</button>
        <select id="mirror-mode-live">
          <option value="none">No Mirror</option>
          <option value="horizontal">← Horizontal</option>
          <option value="vertical">↕ Vertical</option>
          <option value="both">↻ Both</option>
        </select>
        <button id="exit-btn">✖️ Exit</button>
      </div>
    </div>
  </div>
  
  <script src="app.js"></script>
</body>
</html>
